services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=budget_production
      - POSTGRES_USER=budget
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - db_data:/data/db
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://budget:${POSTGRES_PASSWORD}@postgres/budget_production
      - POCKETSMITH_API_KEY=${POCKETSMITH_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - NTFY_URL=${NTFY_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3001}
    depends_on:
      - postgres
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: bundle exec rails solid_queue:start
    volumes:
      - db_data:/data/db
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://budget:${POSTGRES_PASSWORD}@postgres/budget_production
      - POCKETSMITH_API_KEY=${POCKETSMITH_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - NTFY_URL=${NTFY_URL}
    depends_on:
      - api
      - postgres
    restart: unless-stopped

